name: macOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  swift-prototype:
    name: Swift prototype
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build for Apple Silicon
        run: swift build --package-path swift-native -c release --arch arm64
      - name: Validate property list
        run: plutil -lint swift-native/AppResources/Info.plist

  macos-only-guard:
    name: macOS-only source guard
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Verify build scripts
        run: |
          bash -n scripts/build-macos-arm64.sh
          bash -n scripts/build-swift-prototype.sh
      - name: Verify product naming
        run: |
          test "$(sed -n 's/^set(MAIN_NAME "\(.*\)")/\1/p' CMakeModules/NameConfiguration.cmake)" = "MacJMP"
          grep -q 'project(macjmp CXX C)' CMakeLists.txt
          grep -q 'MacJMP supports macOS only' CMakeLists.txt
